kind: Deployment
apiVersion: apps/v1
metadata:
  name: frontend-app-deployment
  labels:
    app: frontend-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-app
  template:
    metadata:
      labels:
        app: frontend-app
    spec:
      containers:
        - name: frontend-app-container
          image: tiir-registry.cr.cloud.ru/frontend-student-and-t:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5173
              name: http
          envFrom:
            - secretRef:
                name: frontend-app-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
