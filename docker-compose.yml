version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: student_t_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=student_t_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: student_t_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=student_t_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - UPLOAD_DIR=/backend/uploads/resumes
      - MAX_FILE_SIZE=10485760
    volumes:
      - ./backend:/backend
      - uploads_data:/backend/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: student_t_frontend
    restart: always
    environment:
      - VITE_API_URL=http://backend:8000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
